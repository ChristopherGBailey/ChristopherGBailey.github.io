<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { font-family: -apple-system, sans-serif; margin: 1rem; color: #222; background: #f5f5f5; }
  label { font-size: 20px; color: #555; }
  input[type=range] { width: 100%; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.5rem; }
  .full { grid-column: span 2; }
  .row { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .val { font-size: 20px; font-weight: 500; }
  .legend { display: flex; gap: 16px; margin-bottom: 1rem; font-size: 16px; color: #555; }
  .legend span { display: flex; align-items: center; gap: 4px; }
  .swatch { width: 10px; height: 3px; border-radius: 2px; display: inline-block; }
  .note { font-size: 14px; color: #888; margin-top: 8px; }
</style>
</head>
<body>
<div class="grid">
  <div>
    <div class="row"><label>Bandgap, Eg (eV)</label><span class="val" id="Eg-out">2.350</span></div>
    <input type="range" id="Eg" min="2.0" max="2.8" step="0.005" value="2.35">
  </div>
  <div>
    <div class="row"><label>Exciton binding energy, Eb (eV)</label><span class="val" id="Eb-out">0.050</span></div>
    <input type="range" id="Eb" min="0.01" max="0.2" step="0.001" value="0.05">
  </div>
  <div class="full">
    <div class="row"><label>Broadening, σ (eV)</label><span class="val" id="sigma-out">0.020</span></div>
    <input type="range" id="sigma" min="0.001" max="0.1" step="0.001" value="0.02">
  </div>
</div>
<div class="legend">
  <span><span class="swatch" style="background:#e24b4a;"></span>Total</span>
  <span><span class="swatch" style="background:#378add;"></span>Exciton</span>
  <span><span class="swatch" style="background:#1d9e75;"></span>Free carrier</span>
</div>
<div style="display:flex;gap:12px;align-items:stretch;">
  <div style="position:relative;flex:1;height:320px;">
    <canvas id="elliottChart"></canvas>
  </div>
  <div style="width:130px;flex-shrink:0;height:320px;">
    <svg id="bandDiagram" width="130" height="320" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
</div>
<p class="note">Interactive Elliott theory model for optical absorption.</p>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const dE = 0.002;
const E_pad = 0.3, E_display_min = 2.0, E_display_max = 2.65;
const E_comp_min = E_display_min - E_pad, E_comp_max = E_display_max + E_pad;
const E_full = [];
for (let e = E_comp_min; e <= E_comp_max + 1e-9; e += dE) E_full.push(parseFloat(e.toFixed(3)));
const display_start = Math.round(E_pad / dE);
const display_end = E_full.length - Math.round(E_pad / dE);
const E_display = E_full.slice(display_start, display_end);

function elliottModel(E, Eg, Eb, sigma) {
  const nmax = 5, n_pts = E.length;
  const alpha_bound = new Array(n_pts).fill(0);
  const alpha_cont = new Array(n_pts).fill(0);
  for (let n = 1; n <= nmax; n++) {
    const En = Eg - Eb / (n * n);
    for (let i = 0; i < n_pts; i++)
      alpha_bound[i] += (4 * Math.PI / Math.pow(n, 3)) * Math.exp(-((E[i] - En) ** 2) / (2 * sigma * sigma));
  }
  for (let i = 0; i < n_pts; i++) {
    if (E[i] > Eg) {
      const eta = Math.sqrt(Math.max(Eb / (E[i] - Eg), 0));
      const piEta = Math.PI * eta, sh = Math.sinh(piEta);
      const s = sh > 0 ? (Math.PI * Math.exp(piEta)) / sh : 0;
      alpha_cont[i] = isFinite(s) ? s : 0;
    }
  }
  const halfW = Math.round(4 * sigma / dE), kSize = 2 * halfW + 1;
  const kernel = []; let kSum = 0;
  for (let i = 0; i < kSize; i++) { const v = Math.exp(-0.5 * ((i - halfW) * dE / sigma) ** 2); kernel.push(v); kSum += v; }
  for (let i = 0; i < kSize; i++) kernel[i] /= kSum;
  function convolve(arr) {
    const out = new Array(n_pts).fill(0);
    for (let i = 0; i < n_pts; i++) { let s = 0; for (let k = 0; k < kSize; k++) { const j = i - halfW + k; if (j >= 0 && j < n_pts) s += arr[j] * kernel[k]; } out[i] = s; }
    return out;
  }
  const exc_conv = convolve(alpha_bound), cont_conv = convolve(alpha_cont);
  return {
    total: exc_conv.map((v,i) => v + cont_conv[i]).slice(display_start, display_end),
    exc: exc_conv.slice(display_start, display_end),
    cont: cont_conv.slice(display_start, display_end)
  };
}

const chart = new Chart(document.getElementById('elliottChart').getContext('2d'), {
  type: 'line',
  data: { labels: E_display.map(e => e.toFixed(3)), datasets: [
    { data: [], borderColor: '#e24b4a', borderWidth: 2, pointRadius: 0, tension: 0.3 },
    { data: [], borderColor: '#378add', borderWidth: 1.5, borderDash: [4,3], pointRadius: 0, tension: 0.3 },
    { data: [], borderColor: '#1d9e75', borderWidth: 1.5, borderDash: [4,3], pointRadius: 0, tension: 0.3 },
  ]},
  options: { responsive: true, maintainAspectRatio: false, animation: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { title: { display: true, text: 'Photon energy (eV)', font: { size: 13 } }, ticks: { maxTicksLimit: 8, font: { size: 12 } } },
      y: { title: { display: true, text: 'Absorption (arb. units)', font: { size: 13 } }, ticks: { font: { size: 12 } }, min: 0 }
    }
  }
});

function drawBandDiagram(Eg, Eb) {
  const svg = document.getElementById('bandDiagram');
  const H = 320, mt = 30, mb = 30, usable = H - mt - mb;
  const E_min = 0, E_max = 3.2;
  const eToY = e => mt + usable * (1 - (e - E_min) / (E_max - E_min));
  const vb_top = 0.4, cb_bot = vb_top + Eg, exc_level = cb_bot - Eb-0.1;
  const y_vb_top = eToY(vb_top), y_cb_bot = eToY(cb_bot), y_exc = eToY(exc_level);
  const bx1 = 12, bx2 = 78, band_h = Math.max(usable * 0.18, 20);
  const ns = 'http://www.w3.org/2000/svg';
  svg.innerHTML = '';
  function el(tag, attrs) {
    const e = document.createElementNS(ns, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    svg.appendChild(e); return e;
  }
  function txt(content, x, y, attrs) {
    const e = el('text', { x, y, 'font-size': '10', 'font-family': 'sans-serif', fill: '#444', ...attrs });
    e.textContent = content; return e;
  }
  el('rect', { x: bx1, y: y_vb_top, width: bx2-bx1, height: band_h, fill: '#bcd4f0', stroke: '#378add', 'stroke-width': '1.5', rx: '3' });
  txt('Valence', (bx1+bx2)/2, y_vb_top + band_h/2 - 2, { 'text-anchor': 'middle' });
  txt('band', (bx1+bx2)/2, y_vb_top + band_h/2 + 9, { 'text-anchor': 'middle' });
  el('rect', { x: bx1, y: y_cb_bot - band_h, width: bx2-bx1, height: band_h, fill: '#f5c4b3', stroke: '#e24b4a', 'stroke-width': '1.5', rx: '3' });
  txt('Conduction', (bx1+bx2)/2, y_cb_bot - band_h/2 - 2, { 'text-anchor': 'middle' });
  txt('band', (bx1+bx2)/2, y_cb_bot - band_h/2 + 9, { 'text-anchor': 'middle' });
  if (y_exc > y_cb_bot + 4 && y_exc < y_vb_top - 4) {
    el('line', { x1: bx1+4, y1: y_exc, x2: bx2-4, y2: y_exc, stroke: '#1d9e75', 'stroke-width': '2', 'stroke-dasharray': '4,3' });
    txt('Exciton', bx2+3, y_exc+4, { fill: '#1d9e75' });
  }
  const ax = bx2 + 2;
  el('line', { x1: ax, y1: y_vb_top, x2: ax, y2: y_cb_bot, stroke: '#555', 'stroke-width': '1' });
  el('polygon', { points: `${ax-3},${y_vb_top} ${ax+3},${y_vb_top} ${ax},${y_vb_top+7}`, fill: '#555' });
el('polygon', { points: `${ax-3},${y_cb_bot} ${ax+3},${y_cb_bot} ${ax},${y_cb_bot-7}`, fill: '#555' });
  txt('Eg='+Eg.toFixed(2) + ' eV', ax-60, (y_vb_top+y_cb_bot)/2+4, { fill: '#555' });
  if (y_exc > y_cb_bot + 8) {
    const ax2 = bx1 - 2;
    el('line', { x1: ax2, y1: y_exc, x2: ax2, y2: y_cb_bot, stroke: '#1d9e75', 'stroke-width': '1' });
    el('polygon', { points: `${ax2-3},${y_exc-7} ${ax2+3},${y_exc-7} ${ax2},${y_exc}`, fill: '#1d9e75' });
    el('polygon', { points: `${ax2-3},${y_cb_bot+7} ${ax2+3},${y_cb_bot+7} ${ax2},${y_cb_bot}`, fill: '#1d9e75' });
    txt('Eb='+Eb.toFixed(3)+' eV', ax2-10, y_exc+20, { fill: '#1d9e75' });
  }
}

function update() {
  const Eg = parseFloat(document.getElementById('Eg').value);
  const Eb = parseFloat(document.getElementById('Eb').value);
  const sigma = parseFloat(document.getElementById('sigma').value);
  document.getElementById('Eg-out').textContent = Eg.toFixed(3);
  document.getElementById('Eb-out').textContent = Eb.toFixed(3);
  document.getElementById('sigma-out').textContent = sigma.toFixed(3);
  const { total, exc, cont } = elliottModel(E_full, Eg, Eb, sigma);
  chart.data.datasets[0].data = total;
  chart.data.datasets[1].data = exc;
  chart.data.datasets[2].data = cont;
  chart.update();
  drawBandDiagram(Eg, Eb);
}
['Eg','Eb','sigma'].forEach(id => document.getElementById(id).addEventListener('input', update));
update();
</script>
</body>
</html>
